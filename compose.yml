services:
  postgres:
    image: postgres:18
    container_name: project-intern-postgres
    environment:
      POSTGRES_DB: project_intern
      POSTGRES_USER: intern
      POSTGRES_PASSWORD: intern
    ports:
      - "5433:5432"
    volumes:
      - project_intern_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intern -d project_intern"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  project_intern_postgres_data:
